# 树莓派生产 profile（192.168.0.114）
# 启动：java -jar admin-server.jar --spring.profiles.active=prod
# 或通过环境变量 SPRING_PROFILES_ACTIVE=prod

logging:
  level:
    com.ai.manager: info
  file:
    name: /opt/ai-manager/backend/logs/spring.log
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS

ai-manager:
  deploy:
    runner:
      enabled: true
      mode: local
      project-root: ${AI_MANAGER_ROOT:/home/kyle/ai_manager}
      run-as-user: ${DEPLOY_RUN_AS_USER:kyle}
      git-pull-enabled: ${DEPLOY_GIT_PULL:true}
    backend-dir: /opt/ai-manager/backend
    web-root: /var/www/ai-manager
  baidu-pan:
    # 经 Nginx 80 端口反代；百度开放平台需登记相同回调地址
    redirect-uri: http://192.168.0.114/oauth/baidu/callback
    frontend-redirect-uri: http://192.168.0.114/#/notebook
  note-storage:
    # 树莓派上未配置网盘时可保持 LOCAL；已绑定网盘改为 BAIDU_PAN
    type: ${NOTE_STORAGE_TYPE:LOCAL}
