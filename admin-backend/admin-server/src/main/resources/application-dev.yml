# 本地开发 profile（默认）
logging:
  level:
    com.ai.manager: debug
  charset:
    console: UTF-8
    file: UTF-8
  file:
    # 默认相对当前工作目录；从 admin-backend 启动时用 .deploy，从仓库根目录启动时设 DEPLOY_BACKEND_DIR=admin-backend/.deploy
    name: ${DEPLOY_BACKEND_DIR:.deploy}/logs/spring.log

ai-manager:
  deploy:
    marker-path: admin-server/target/.last-deploy-at
    pi:
      user: ${PI_USER:kyle}
      host: ${PI_HOST:192.168.0.114}
      password: ${PI_PASSWORD:Asd123456}
    backend-dir: ${DEPLOY_BACKEND_DIR:.deploy}
    web-root: ${DEPLOY_WEB_ROOT:/var/www/ai-manager}
    runner:
      enabled: true
      mode: remote
  baidu-pan:
    redirect-uri: http://192.168.0.114/oauth/baidu/callback
    frontend-redirect-uri: http://192.168.0.114/#/notebook
  note-storage:
    # 本地未绑定百度网盘时可先用 LOCAL；绑定后改回 BAIDU_PAN
    type: LOCAL
