server:
  port: 8080
  # 允许局域网设备（ESP 副屏、手机）访问
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-manager-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    async:
      request-timeout: 3600000
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ai_manager_admin}?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ai-manager:
  upload:
    ecommerce-path: uploads/ecommerce
    notebook-images-path: uploads/notebook/images
  deploy:
    backend-jar-path: ${DEPLOY_BACKEND_JAR_PATH:/opt/ai-manager/backend/admin-server.jar}
    frontend-index-path: ${DEPLOY_FRONTEND_INDEX_PATH:/var/www/ai-manager/index.html}
    runner:
      enabled: false
      mode: ${DEPLOY_RUNNER_MODE:auto}
      project-root: ${AI_MANAGER_ROOT:}
      run-as-user: ${DEPLOY_RUN_AS_USER:}
      git-pull-enabled: ${DEPLOY_GIT_PULL:true}
    sql-terminal:
      node118:
        host: ${DEPLOY_SQL_NODE118_HOST:192.168.0.118}
        port: ${DEPLOY_SQL_NODE118_PORT:3306}
        database: ${DEPLOY_SQL_NODE118_DATABASE:ai_manager_admin}
        username: ${DEPLOY_SQL_NODE118_USER:ai_manager}
        password: ${DEPLOY_SQL_NODE118_PASSWORD:123456}
  baidu-pan:
    app-key: ${BAIDU_APP_KEY:0FzEpqFsRX50bkxhGls0WUZfXvnDLL59}
    secret-key: ${BAIDU_SECRET_KEY:mgOo20RU4AzgH8VBzKYV3aIH3CjVtxco}
    app-folder-name: ai_blog
    default-user-id: 1
  note-storage:
    local-root: uploads/notebook-content
    cache-ttl-seconds: 3600

logging:
  level:
    com.ai.manager.system.mapper: warn
