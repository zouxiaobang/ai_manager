server:
  port: 8080
  # 允许局域网设备（ESP 副屏）访问会话 API
  address: 0.0.0.0

spring:
  application:
    name: ai-manager-admin
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/ai_manager_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ai-manager:
  upload:
    ecommerce-path: uploads/ecommerce

logging:
  level:
    com.ai.manager: debug
    # 关闭 MyBatis SQL 日志（mapper 继承 com.ai.manager 的 debug 级别）
    com.ai.manager.system.mapper: warn
