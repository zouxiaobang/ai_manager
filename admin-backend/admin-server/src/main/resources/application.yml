server:
  port: 8080
  # 允许局域网设备（ESP 副屏、手机）访问
  address: 0.0.0.0

spring:
  application:
    name: ai-manager-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ai_manager_admin}?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ai-manager:
  upload:
    ecommerce-path: uploads/ecommerce
    notebook-images-path: uploads/notebook/images
  deploy:
    backend-jar-path: ${DEPLOY_BACKEND_JAR_PATH:/opt/ai-manager/backend/admin-server.jar}
    frontend-index-path: ${DEPLOY_FRONTEND_INDEX_PATH:/var/www/ai-manager/index.html}
    runner:
      enabled: false
      mode: ${DEPLOY_RUNNER_MODE:auto}
      project-root: ${AI_MANAGER_ROOT:}
      run-as-user: ${DEPLOY_RUN_AS_USER:}
      git-pull-enabled: ${DEPLOY_GIT_PULL:true}
  baidu-pan:
    app-key: ${BAIDU_APP_KEY:0FzEpqFsRX50bkxhGls0WUZfXvnDLL59}
    secret-key: ${BAIDU_SECRET_KEY:mgOo20RU4AzgH8VBzKYV3aIH3CjVtxco}
    app-folder-name: ai_blog
    default-user-id: 1
  note-storage:
    local-root: uploads/notebook-content
    cache-ttl-seconds: 3600

logging:
  level:
    com.ai.manager.system.mapper: warn
