# AI Manager — Nginx 站点（应用节点 192.168.0.114）
# 安装：
#   sudo cp deploy/nginx/ai-manager.conf /etc/nginx/sites-available/ai-manager
#   sudo ln -sf /etc/nginx/sites-available/ai-manager /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 192.168.0.114;

    root /var/www/ai-manager;
    index index.html;

    client_max_body_size 12m;

    # 静态资源：禁止 fallback 到 index.html（否则 .js 返回 HTML 导致 PC 白屏）
    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /app-shell.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /vite.svg {
        try_files $uri =404;
    }

    # API → Spring Boot :8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 百度网盘 OAuth 回调
    location /oauth/ {
        proxy_pass http://127.0.0.1:8080/oauth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA 入口（Hash 路由：/#/home）；入口 HTML 禁止长期缓存，避免部署后仍引用旧 hash 的 JS
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
